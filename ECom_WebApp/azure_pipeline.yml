name: ECom CI/CD

trigger:
  branches:
    include:
      - main

variables:
  dotnetVersion: '8.0.x'
  buildConfig: 'Release'
  root: 'ECom_WebApp'
  webApiProject: '$(root)/TestWebAPI/TestWebAPI.csproj'
  iisAppPool: 'EComWebApp'
  iisDeployPath: 'C:\inetpub\wwwroot\EComWebApp'

stages:

# ═══════════════════════════════════════
# STAGE 1 — CI
# ═══════════════════════════════════════
- stage: CI
  displayName: 'CI — Build & Test'
  jobs:
  - job: BuildAndTest
    displayName: 'Restore → Build → Test → Publish'
    pool:
      vmImage: 'windows-latest'
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET $(dotnetVersion)'
      inputs:
        version: $(dotnetVersion)

    - script: |
        dotnet restore $(root)/Ecom.Core/Ecom.Core.csproj
        dotnet restore $(root)/ECom.Application/ECom.Application.csproj
        dotnet restore $(root)/ECom.Infra/ECom.Infra.csproj
        dotnet restore $(root)/ECom.Presentation/ECom.Presentation.csproj
        dotnet restore $(root)/ECommerceConsoleApp/ECommerceConsoleApp.csproj
        dotnet restore $(root)/TestWebAPI/TestWebAPI.csproj
      displayName: 'Restore all projects'

    - script: |
        dotnet build $(root)/Ecom.Core/Ecom.Core.csproj                    -c $(buildConfig) --no-restore
        dotnet build $(root)/ECom.Application/ECom.Application.csproj       -c $(buildConfig) --no-restore
        dotnet build $(root)/ECom.Infra/ECom.Infra.csproj                   -c $(buildConfig) --no-restore
        dotnet build $(root)/ECom.Presentation/ECom.Presentation.csproj     -c $(buildConfig) --no-restore
        dotnet build $(root)/ECommerceConsoleApp/ECommerceConsoleApp.csproj -c $(buildConfig) --no-restore
        dotnet build $(root)/TestWebAPI/TestWebAPI.csproj                   -c $(buildConfig) --no-restore
      displayName: 'Build in dependency order'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests'
      inputs:
        command: test
        projects: '$(webApiProject)'
        arguments: '-c $(buildConfig) --no-restore --logger trx'
        publishTestResults: true

    - task: DotNetCoreCLI@2
      displayName: 'Publish WebAPI'
      inputs:
        command: publish
        publishWebProjects: false
        projects: '$(webApiProject)'
        arguments: '-c $(buildConfig) --no-restore --output $(Build.ArtifactStagingDirectory)/webapi'
        zipAfterPublish: false

    # ── FIX: Copy all extra content files (txt, md, json, etc.)
    #         that dotnet publish skips, into the artifact folder ──
    - task: CopyFiles@2
      displayName: 'Copy extra content files into artifact'
      inputs:
        SourceFolder: '$(root)/TestWebAPI'
        Contents: |
          **\*.txt
          **\*.md
          **\*.json
          **\*.xml
          **\*.csv
          **\*.html
          **\*.htm
          **\*.config
        TargetFolder: '$(Build.ArtifactStagingDirectory)/webapi/TestWebAPI'
        OverWrite: true
        flattenFolders: false

    - task: PublishBuildArtifacts@1
      displayName: 'Upload artifact: webapi-drop'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/webapi'
        ArtifactName: 'webapi-drop'

# ═══════════════════════════════════════
# STAGE 2 — CD
# ═══════════════════════════════════════
- stage: CD
  displayName: 'CD — Deploy to IIS'
  dependsOn: CI
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToIIS
    displayName: 'Deploy to IIS — EComWebApp'
    pool:
      name: 'Default'
    environment: 'iis-local'
    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadBuildArtifacts@1
            displayName: 'Download webapi-drop'
            inputs:
              buildType: current
              downloadType: single
              artifactName: webapi-drop
              downloadPath: $(Pipeline.Workspace)

          # ── Stop app pool and wait until fully stopped ──
          - task: PowerShell@2
            displayName: 'Stop IIS app pool'
            inputs:
              targetType: inline
              script: |
                Import-Module WebAdministration
                $pool = "$(iisAppPool)"
                if ((Get-WebAppPoolState -Name $pool).Value -ne "Stopped") {
                    Stop-WebAppPool -Name $pool
                    $timeout = 15
                    while ((Get-WebAppPoolState -Name $pool).Value -ne "Stopped" -and $timeout -gt 0) {
                        Start-Sleep -Seconds 1
                        $timeout--
                        Write-Host "Waiting for app pool to stop... ($timeout s left)"
                    }
                    $finalState = (Get-WebAppPoolState -Name $pool).Value
                    Write-Host "App pool '$pool' is now: $finalState"
                } else {
                    Write-Host "App pool '$pool' was already stopped."
                }

          # ── Kill lingering process then clear deploy folder ──
          - task: PowerShell@2
            displayName: 'Clear deploy folder'
            inputs:
              targetType: inline
              script: |
                $proc = Get-Process -Name "TestWebAPI" -ErrorAction SilentlyContinue
                if ($proc) {
                    $proc | Stop-Process -Force
                    Start-Sleep -Seconds 2
                    Write-Host "Killed lingering TestWebAPI process."
                } else {
                    Write-Host "No lingering TestWebAPI process found."
                }

                $dest = "$(iisDeployPath)"
                if (Test-Path $dest) {
                    Remove-Item "$dest\*" -Recurse -Force
                    Write-Host "Cleared $dest"
                } else {
                    New-Item -ItemType Directory -Path $dest | Out-Null
                    Write-Host "Created $dest"
                }

          # ── Copy ALL files including empty ones, preserving folder structure ──
          - task: CopyFiles@2
            displayName: 'Copy published files to IIS folder'
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/webapi-drop'
              Contents: '**'
              TargetFolder: '$(iisDeployPath)'
              OverWrite: true
              flattenFolders: false

          - task: PowerShell@2
            displayName: 'Start IIS app pool'
            inputs:
              targetType: inline
              script: |
                Import-Module WebAdministration
                $pool = "$(iisAppPool)"
                Start-WebAppPool -Name $pool
                Start-Sleep -Seconds 3
                $state = (Get-WebAppPoolState -Name $pool).Value
                Write-Host "App pool '$pool' is now: $state"

          - task: PowerShell@2
            displayName: 'Verify deployment'
            inputs:
              targetType: inline
              script: |
                $dest  = "$(iisDeployPath)"
                $dll   = Get-ChildItem $dest -Filter "TestWebAPI.dll" -Recurse -ErrorAction SilentlyContinue
                $exe   = Get-ChildItem $dest -Filter "TestWebAPI.exe" -Recurse -ErrorAction SilentlyContinue
                $web   = Get-ChildItem $dest -Filter "web.config"     -Recurse -ErrorAction SilentlyContinue
                $extra = Get-ChildItem $dest -Include "*.txt","*.md"  -Recurse -ErrorAction SilentlyContinue
                $count = (Get-ChildItem $dest -Recurse -File).Count

                if ($dll -or $exe) {
                    Write-Host "SUCCESS - deployment verified. $count files in $dest"
                } elseif ($web) {
                    Write-Host "WARNING - web.config found but no dll/exe. $count files present."
                } else {
                    Write-Warning "Could not verify. Listing contents:"
                    Get-ChildItem $dest -Recurse | Select-Object FullName
                }

                if ($extra) {
                    Write-Host "Content files deployed:"
                    $extra | ForEach-Object { Write-Host "  $($_.FullName)" }
                } else {
                    Write-Host "No .txt/.md files found in deploy folder."
                }